<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miss You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #ffb3c6, #ffdde1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
        }
        .box {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0px 6px 25px rgba(0, 0, 0, 0.2);
            max-width: 350px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            opacity: 0.8;
        }
        .heart {
            font-size: 40px;
            margin-top: 10px;
            animation: beat 1.5s infinite;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Delam barat tang shode</h1>
        <p>Kay azad mishi?</p>
        <div class="heart">❤️</div>
    </div>
</body>
</html>
